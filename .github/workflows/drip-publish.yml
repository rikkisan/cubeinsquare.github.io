name: Drip Publish

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: drip-publish
  cancel-in-progress: false

jobs:
  publish-next-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish next queued release
        shell: bash
        run: bash .github/scripts/drip-publish.sh
